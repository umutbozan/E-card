<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Kaiji E-Card | Pro Edition</title>
    <style>
        :root { --gold: #d4af37; --blood: #8a0303; --bg: #0a0a0a; }
        body { 
            background-color: var(--bg); color: white; font-family: 'Garamond', serif; 
            margin: 0; padding: 0; min-height: 100vh;
            background-image: radial-gradient(circle, #1a1a1a 0%, #0a0a0a 100%);
            display: flex; flex-direction: column; overflow: hidden;
        }

        @keyframes slideToTable {
            0% { transform: translateY(100px) scale(0.5); opacity: 0; }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }

        #selection-screen {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000;
        }

        .ui-header {
            display: flex; justify-content: space-around; align-items: center;
            padding: 15px; border-bottom: 2px solid var(--gold); background: rgba(0,0,0,0.9);
        }

        .stat-box { border: 1px solid var(--gold); padding: 8px 20px; border-radius: 4px; text-align: center; }
        .stat-label { font-size: 11px; color: var(--gold); text-transform: uppercase; display: block; }
        .stat-value { font-size: 20px; font-weight: bold; }

        .game-container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: space-evenly; padding: 20px; }
        .hand { display: flex; gap: 12px; height: 160px; align-items: center; }
        .card {
            width: 100px; height: 150px; background-size: cover; border: 2px solid #444;
            border-radius: 10px; cursor: pointer; transition: 0.3s;
        }
        .card.selected { transform: translateY(-30px); border-color: var(--gold); box-shadow: 0 0 20px var(--gold); }
        .card.disabled { cursor: not-allowed; opacity: 0.7; }

        .opponent-card { background-image: url('back.png'); }
        .card.emperor { background-image: url('emperor.png'); }
        .card.citizen { background-image: url('citizen.png'); }
        .card.slave { background-image: url('slave.png'); }

        .battleground {
            width: 450px; height: 220px; border: 2px solid #222;
            display: flex; justify-content: center; align-items: center; gap: 30px;
            background: rgba(255,255,255,0.03); border-radius: 15px;
        }

        .slot-animation { animation: slideToTable 0.5s ease-out forwards; }
        .placeholder { width: 100px; height: 150px; border: 2px dashed #333; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #333; }
        #status { font-size: 1.4rem; color: var(--gold); font-weight: bold; height: 3rem; text-align: center; }

        button { background: var(--gold); color: black; border: none; padding: 15px 30px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .action-btn { display: none; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="selection-screen">
        <h1 style="color: var(--gold); letter-spacing: 5px;">KAIJI ONLINE</h1>
        <input type="text" id="room-input" placeholder="Oda Adı" style="padding:10px; margin-bottom:10px; background:#111; color:white; border:1px solid var(--gold);">
        <button onclick="joinRoom()">ODAYA KATIL</button>
    </div>

    <div class="ui-header">
        <div class="stat-box"><span class="stat-label">Cüzdan</span><span id="balance" class="stat-value">10,000 ¥</span></div>
        <div class="stat-box"><span class="stat-label">Skor</span><span id="score" class="stat-value">0 - 0</span></div>
    </div>

    <div class="game-container">
        <div class="hand" id="opponent-hand"></div>
        <div id="status">Bağlantı bekleniyor...</div>
        <div class="battleground">
            <div id="slot-opponent" class="placeholder">RAKİP</div>
            <div id="slot-player" class="placeholder">SEN</div>
        </div>
        <div class="hand" id="player-hand"></div>
        <div class="controls">
            <button id="confirm-btn" class="action-btn" onclick="confirmPlay()">KARTI SÜR</button>
            <button id="next-btn" class="action-btn" style="background: var(--blood); color: white;" onclick="nextStep()">DEVAM ET ➔</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let currentRoom = "";
        let playerSide = "";
        let playerHand = [], selectedIdx = -1, isWaiting = false;
        let balance = 10000, pScore = 0, oScore = 0;

        function joinRoom() {
            currentRoom = document.getElementById('room-input').value || "genel";
            socket.emit('join-room', currentRoom);
            document.getElementById('selection-screen').innerHTML = "<h1>RAKİP BEKLENİYOR...</h1>";
        }

        socket.on('assigned-side', (side) => {
            playerSide = side;
            document.getElementById('selection-screen').style.display = 'none';
            initRound();
        });

        function initRound() {
            const isEmp = playerSide === "EMPEROR";
            playerHand = isEmp ? ["citizen", "citizen", "citizen", "citizen", "emperor"] : ["citizen", "citizen", "citizen", "citizen", "slave"];
            isWaiting = false;
            selectedIdx = -1;
            renderHands();
            document.getElementById('status').innerText = "KARTINI SEÇ";
        }

        function renderHands() {
            const pDiv = document.getElementById('player-hand');
            pDiv.innerHTML = '';
            playerHand.forEach((type, i) => {
                const c = document.createElement('div');
                c.className = `card ${type} ${i === selectedIdx ? 'selected' : ''}`;
                c.onclick = () => { if(!isWaiting) { selectedIdx = i; renderHands(); document.getElementById('confirm-btn').style.display = 'block'; } };
                pDiv.appendChild(c);
            });
            document.getElementById('opponent-hand').innerHTML = '<div class="card opponent-card"></div>'.repeat(playerHand.length);
        }

        function confirmPlay() {
            if(selectedIdx === -1 || isWaiting) return;
            const card = playerHand[selectedIdx];
            isWaiting = true;
            document.getElementById('confirm-btn').style.display = 'none';
            document.getElementById('status').innerText = "RAKİP BEKLENİYOR...";
            
            socket.emit('play-card', { roomId: currentRoom, card: card, idx: selectedIdx });
            document.getElementById('slot-player').innerHTML = `<div class="card ${card} slot-animation"></div>`;
        }

        socket.on('resolve-cards', (hands) => {
            const myId = socket.id;
            const oppId = Object.keys(hands).find(id => id !== myId);
            const myCard = hands[myId].card;
            const oppCard = hands[oppId].card;

            document.getElementById('slot-opponent').innerHTML = `<div class="card ${oppCard} slot-animation"></div>`;
            
            setTimeout(() => {
                let res = (myCard === oppCard) ? "DRAW" : 
                          ((myCard === "emperor" && oppCard === "citizen") || (myCard === "citizen" && oppCard === "slave") || (myCard === "slave" && oppCard === "emperor")) ? "WIN" : "LOSE";

                if(res === "WIN") { pScore++; document.getElementById('status').innerText = "KAZANDIN!"; }
                else if(res === "LOSE") { oScore++; document.getElementById('status').innerText = "KAYBETTİN!"; }
                else { document.getElementById('status').innerText = "BERABERE!"; }

                updateUI();
                document.getElementById('next-btn').style.display = 'block';
            }, 800);
        });

        function nextStep() {
            document.getElementById('next-btn').style.display = 'none';
            if(selectedIdx !== -1) playerHand.splice(selectedIdx, 1);
            if(playerHand.length === 0) return initRound(); // El bittiyse sıfırla
            selectedIdx = -1;
            isWaiting = false;
            renderHands();
            document.getElementById('slot-player').innerHTML = "SEN";
            document.getElementById('slot-opponent').innerHTML = "RAKİP";
            document.getElementById('status').innerText = "SIRADAKİ HAMLE";
        }

        function updateUI() {
            document.getElementById('score').innerText = `${pScore} - ${oScore}`;
        }
    </script>
</body>
</html>
